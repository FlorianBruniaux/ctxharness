# ctxharness CI template — copy to .github/workflows/ctxharness.yml
# Checks AI documentation drift on every push and pull request.
#
# Trigger conditions — adjust to your project:
# - Push to any branch (catches drift before merge)
# - PR to main (required check before merge)
# - Schedule: weekly drift scan even without code changes

name: AI Documentation Drift Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC

concurrency:
  group: ctxharness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Check AI doc drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ctxharness
        run: npm install -g ctxharness@latest

      # Step 1 — zero-config scan (always passes, informational)
      # Shows drift in the logs without breaking the build.
      # Remove --exit-zero once you have a .ctxharness.yml configured.
      - name: Scan AI docs (zero-config)
        run: ctxharness scan --exit-zero
        if: ${{ !hashFiles('.ctxharness.yml') }}

      # Step 2 — full enforcement (exits 1 on drift, requires .ctxharness.yml)
      # Uncomment once you have a config file in place.
      # - name: Check AI doc drift
      #   run: ctxharness run --format gha
